{% extends "main/base.html" %}
{% block title %}Edit Project{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
<h2>Edit Project: {{ project.title }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Save Update</button>
</form>
{% endblock %}
